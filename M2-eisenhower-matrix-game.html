<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Матрица Эйзенхауэра</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red:    #C31532;
  --dark:   #003B48;
  --slate:  #495761;
  --cream:  #FAF8F4;
  --sand:   #F0EDE6;
  --border: #DDD8CF;
  --white:  #FFFFFF;
  --green:  #1A6B4A;
  --green-bg:     #EBF5EF;
  --green-border: #A8D5BC;
  --red-bg:    #FEF0F2;
  --red-border:#F2A0AC;
}

html, body {
  font-family: 'Manrope', sans-serif;
  background: var(--cream);
  color: var(--dark);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--red) 0%, var(--dark) 50%, var(--red) 100%);
  z-index: 200;
}

#app {
  max-width: 680px;
  margin: 0 auto;
  padding: 44px 20px 60px;
}

/* ── SHARED ── */
.eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--red); margin-bottom: 14px;
}
.page-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(24px, 5vw, 38px); font-weight: 900;
  color: var(--dark); line-height: 1.15; margin-bottom: 6px;
}
.page-title span { color: var(--red); }
.divider { width: 50px; height: 2px; background: var(--red); margin: 16px 0; }

/* ── INTRO ── */
.intro { animation: fadeUp 0.5s ease both; }
.intro-legend {
  background: var(--dark); color: var(--white);
  border-radius: 10px; padding: 20px 22px; margin: 20px 0;
  font-size: 14px; line-height: 1.7;
}
.legend-tag {
  display: inline-block; background: var(--red); color: var(--white);
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 10px; border-radius: 3px; margin-bottom: 10px;
}
.quadrants-hint {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0 4px;
}
.qh-cell {
  border-radius: 8px; padding: 10px 12px; border: 1.5px solid;
}
.qh-cell.do   { background: #EBF5EF; border-color: #A8D5BC; }
.qh-cell.plan { background: #EEF3FB; border-color: #9DBAE0; }
.qh-cell.del  { background: #FFF3DC; border-color: #F5C96B; }
.qh-cell.drop { background: #F5F5F5; border-color: #CCC; }
.qh-label { font-size: 12px; font-weight: 700; color: var(--dark); margin-bottom: 2px; }
.qh-desc  { font-size: 11px; color: var(--slate); line-height: 1.4; }

.btn-start {
  display: flex; align-items: center; justify-content: center; width: 100%;
  background: var(--dark); color: var(--white); border: none; border-radius: 4px;
  padding: 15px; font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: background 0.2s, transform 0.15s; margin-top: 20px;
}
.btn-start:hover { background: var(--red); transform: translateY(-1px); }

/* ── PROGRESS ── */
.progress-wrap { margin-bottom: 22px; }
.progress-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 7px;
}
.progress-label {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--slate);
}
.progress-frac {
  font-family: 'Playfair Display', serif;
  font-size: 17px; font-weight: 900; color: var(--dark);
}
.progress-frac span { color: var(--red); }
.progress-bar-bg { height: 4px; background: var(--sand); border-radius: 2px; overflow: hidden; }
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--dark), var(--red));
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* ── TASK CARD ── */
.task-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 28px 24px 22px;
  margin-bottom: 18px;
  animation: cardIn 0.38s cubic-bezier(0.34,1.1,0.64,1) both;
}
.task-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; color: var(--red); margin-bottom: 10px;
}
.task-text {
  font-family: 'Playfair Display', serif;
  font-size: clamp(17px, 3.5vw, 22px); font-weight: 700;
  color: var(--dark); line-height: 1.35;
}

/* ── MATRIX ── */
.matrix-wrap {
  display: flex; gap: 12px; align-items: stretch; margin-bottom: 16px;
}
.axis-y {
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 0 10px 28px 0;
  min-width: 56px;
}
.axis-y-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--slate);
  writing-mode: vertical-rl; transform: rotate(180deg);
  display: flex; align-items: center;
}
.axis-y-arrow {
  font-size: 13px; color: var(--border); text-align: center; margin: 4px 0;
}
.matrix-right { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.buttons-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.axis-x {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  padding-top: 2px;
}
.axis-x-label {
  font-size: 11px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--slate); text-align: center;
}

/* ── QUADRANT BUTTONS ── */
.q-btn {
  background: var(--white); border: 2px solid var(--border);
  border-radius: 10px; padding: 14px 10px;
  font-family: 'Manrope', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--slate);
  cursor: pointer; min-height: 88px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 4px; text-align: center;
  transition: border-color 0.15s, background 0.15s, transform 0.12s, opacity 0.2s;
  user-select: none;
}
.q-btn-icon { font-size: 20px; line-height: 1; }
.q-btn-name { font-size: 12px; font-weight: 700; color: var(--dark); }
.q-btn-sub  { font-size: 10px; color: var(--slate); line-height: 1.3; }

.q-btn:hover:not(:disabled) {
  border-color: var(--dark); background: var(--sand); transform: translateY(-2px);
}
.q-btn:disabled { cursor: not-allowed; }
.q-btn.dimmed { opacity: 0.35; }

/* correct */
.q-btn.correct {
  border-color: var(--green); background: var(--green-bg);
  animation: pulse 0.45s ease;
}
.q-btn.correct .q-btn-name { color: var(--green); }
.q-btn.correct .q-btn-sub  { color: var(--green); }

/* wrong */
.q-btn.wrong {
  border-color: var(--red); background: var(--red-bg);
  animation: shake 0.4s ease;
}
.q-btn.wrong .q-btn-name { color: var(--red); }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

/* ── FEEDBACK ── */
.feedback-box {
  border-radius: 10px; padding: 14px 16px; margin-bottom: 14px;
  font-size: 13px; line-height: 1.6; display: none;
  animation: fadeUp 0.3s ease both;
}
.feedback-box.show  { display: block; }
.feedback-box.ok    { background: var(--green-bg); border-left: 4px solid var(--green); color: #1A4A35; }
.feedback-box.err   { background: var(--red-bg);   border-left: 4px solid var(--red);   color: #7A1525; }
.feedback-head { font-weight: 700; margin-bottom: 4px; font-size: 12px; }

.btn-next {
  width: 100%; background: var(--dark); color: var(--white);
  border: none; border-radius: 4px; padding: 13px;
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: background 0.15s; display: none;
}
.btn-next.show { display: block; }
.btn-next:hover { background: var(--red); }

/* ── RESULTS ── */
.results { animation: fadeUp 0.5s ease both; }
.results-hero {
  background: var(--dark); color: var(--white);
  border-radius: 12px; padding: 32px 28px; text-align: center;
  margin-bottom: 20px;
}
.results-icon { font-size: 48px; margin-bottom: 14px; }
.results-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px,5vw,30px); font-weight: 900; margin-bottom: 10px;
}
.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 64px; font-weight: 900; color: var(--white);
  margin: 10px 0 6px;
}
.score-big span { color: rgba(255,255,255,0.4); font-size: 36px; }
.score-sub { font-size: 13px; color: rgba(255,255,255,0.65); }

.results-insight {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 16px 18px; margin-bottom: 16px;
  font-size: 13px; line-height: 1.65; color: var(--slate);
}
.btn-restart {
  width: 100%; background: var(--white); color: var(--dark);
  border: 1.5px solid var(--border); border-radius: 4px; padding: 13px;
  font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.btn-restart:hover { border-color: var(--dark); background: var(--sand); }

/* ── ANIMATIONS ── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes cardIn  { from{opacity:0;transform:translateY(18px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }

@media (max-width: 420px) {
  .quadrants-hint { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ═══════════════════════════════════════════════
//  TASKS — глагол в начале, нейтральный контекст
//  (руководитель отдела в любой отрасли)
//  correct: 'do' | 'plan' | 'delegate' | 'drop'
// ═══════════════════════════════════════════════
const TASKS = [
  {
    text: 'Ответить на жалобу ключевого клиента — он ждёт реакции уже 30 минут',
    correct: 'do',
    why: 'Репутационный риск нарастает с каждой минутой. Это важно и срочно — квадрат «Сделать сейчас».',
    feedbackWrong: {
      plan:     'Клиент уже ждёт — откладывать нельзя. Дедлайн наступил прямо сейчас.',
      delegate: 'Ключевого клиента обычно ведёт сам руководитель. Делегирование здесь рискованно.',
      drop:     'Жалоба ключевого клиента — это и важно, и срочно. Игнорировать нельзя.',
    }
  },
  {
    text: 'Провести анализ конкурентов для формирования плана на следующий квартал',
    correct: 'plan',
    why: 'Стратегически важно, но дедлайна «прямо сейчас» нет. Запланируйте конкретное время — квадрат «Запланировать».',
    feedbackWrong: {
      do:       'Это важная задача, но не горящая: следующий квартал ещё не начался. Лучше выделить под неё отдельный блок времени.',
      delegate: 'Стратегический анализ требует вашего участия — только вы знаете приоритеты компании на квартал.',
      drop:     'Понимание конкурентов влияет на качество квартального плана. Это важная задача.',
    }
  },
  {
    text: 'Заказать канцелярию для офиса — заканчиваются ручки и бумага',
    correct: 'delegate',
    why: 'Задача нужная, но не требует участия руководителя. Делегируйте — квадрат «Делегировать».',
    feedbackWrong: {
      do:   'Это точно не руководительская задача. Тратить своё время на заказ ручек — потеря фокуса.',
      plan: 'Задача мелкая и операционная. Её не нужно включать в личный план руководителя — достаточно перепоручить.',
      drop: 'Канцелярия нужна команде, просто не вам лично. Перепоручите — и задача исчезнет из вашего списка.',
    }
  },
  {
    text: 'Прочитать корпоративную рассылку о переносе праздничного корпоратива',
    correct: 'drop',
    why: 'Информационный шум без действий с вашей стороны. Если дата меняется — вам сообщат напрямую. Это квадрат «Убрать».',
    feedbackWrong: {
      do:       'Это пассивное информирование, не требующее никаких действий прямо сейчас.',
      plan:     'Нет задачи, которую нужно выполнить. Планировать здесь нечего.',
      delegate: 'Делегировать можно только действия, а не чтение чужой почты.',
    }
  },
  {
    text: 'Подготовить квартальный отчёт для руководства — срок сдачи сегодня в 17:00',
    correct: 'do',
    why: 'Отчёт для руководства с дедлайном сегодня — это важно и срочно. Квадрат «Сделать сейчас».',
    feedbackWrong: {
      plan:     'Срок сдачи — сегодня в 17:00. Откладывать уже поздно.',
      delegate: 'Квартальный отчёт для руководства требует вашей экспертизы и подписи. Полностью делегировать не получится.',
      drop:     'Отчёт для руководства с жёстким дедлайном — одна из самых важных задач дня.',
    }
  },
  {
    text: 'Разработать программу адаптации для новых сотрудников',
    correct: 'plan',
    why: 'Важно для развития команды, но нет горящего срока. Запланируйте под это отдельное время — квадрат «Запланировать».',
    feedbackWrong: {
      do:       'Разработка программы адаптации — объёмная задача, не делается за 15 минут. Нужно выделить время, а не хвататься прямо сейчас.',
      delegate: 'Структуру адаптации задаёт руководитель. Детали можно делегировать, но не всю задачу.',
      drop:     'Хорошая адаптация снижает текучку и ускоряет выход сотрудника на результат. Это важно.',
    }
  },
  {
    text: 'Согласовать счёт на мелкий расходник — 500 рублей, нужна подпись руководителя',
    correct: 'delegate',
    why: 'Рутинное согласование, не требующее вашей экспертизы. Делегируйте право подписи или перенаправьте — квадрат «Делегировать».',
    feedbackWrong: {
      do:       'Подписание счёта на 500 рублей — операционная мелочь. Тратить на это своё внимание неэффективно.',
      plan:     'Это не стратегическая задача. Её нужно убрать из вашего списка, а не переносить.',
      drop:     'Счёт нужно оплатить — задача реальная. Просто не вами.',
    }
  },
  {
    text: 'Изучить рекламное письмо от провайдера корпоративного питания',
    correct: 'drop',
    why: 'Внешняя реклама, не инициированная вами. Не несёт срочных или важных действий — квадрат «Убрать».',
    feedbackWrong: {
      do:       'Это входящая реклама без конкретного запроса с вашей стороны. Нет ни важности, ни срочности.',
      plan:     'Планировать изучение рекламной рассылки — значит засорять свой план.',
      delegate: 'Нет задачи, которую можно делегировать. Просто удалите письмо.',
    }
  },
];

// ── 5 случайных задач без повторений ──
function pickTasks(n) {
  const shuffled = [...TASKS].sort(() => Math.random() - 0.5);
  return shuffled.slice(0, n);
}

const QUADRANTS = [
  { id:'do',       icon:'⚡', name:'Сделать сейчас', sub:'Важно и срочно' },
  { id:'plan',     icon:'📅', name:'Запланировать',  sub:'Важно, не срочно' },
  { id:'delegate', icon:'🤝', name:'Делегировать',   sub:'Срочно, не важно для вас' },
  { id:'drop',     icon:'🗑️', name:'Убрать',         sub:'Не важно, не срочно' },
];

// ── State ──
let tasks = [];
let idx = 0;
let score = 0;
let hadError = false; // true если на текущей задаче уже была ошибка

function render() {
  const app = document.getElementById('app');
  if (idx === -1) { app.innerHTML = renderIntro(); return; }
  if (idx >= tasks.length) { app.innerHTML = renderResults(); return; }
  app.innerHTML = renderGame();
}

// ── INTRO ──
function renderIntro() {
  return `<div class="intro">
    <div class="eyebrow">Модуль 2 · Самоменеджмент</div>
    <div class="page-title">Матрица <span>Эйзенхауэра</span></div>
    <div class="divider"></div>
    <div class="intro-legend">
      <div class="legend-tag">Ваша роль</div>
      Вы — <strong>руководитель отдела клиентского сервиса</strong> в крупной компании. Под вашим
      управлением 8 сотрудников: менеджеры по работе с клиентами, координатор и офис-менеджер.
      Рабочий день в разгаре, задачи поступают одна за другой.
      Ваша цель — быстро определить, <strong>куда отправить каждую задачу</strong>, чтобы не тратить
      ресурс на второстепенное и не упустить важное.
    </div>
    <div class="quadrants-hint">
      <div class="qh-cell do">
        <div class="qh-label">⚡ Сделать сейчас</div>
        <div class="qh-desc">Важно и срочно — беритесь лично и немедленно</div>
      </div>
      <div class="qh-cell plan">
        <div class="qh-label">📅 Запланировать</div>
        <div class="qh-desc">Важно, но не горит — выделите время в календаре</div>
      </div>
      <div class="qh-cell del">
        <div class="qh-label">🤝 Делегировать</div>
        <div class="qh-desc">Срочно, но не ваш уровень — передайте другому</div>
      </div>
      <div class="qh-cell drop">
        <div class="qh-label">🗑️ Убрать</div>
        <div class="qh-desc">Не важно, не срочно — уберите из списка</div>
      </div>
    </div>
    <button class="btn-start" onclick="startGame()">Начать тренировку →</button>
  </div>`;
}

// ── GAME ──
function renderGame() {
  const task = tasks[idx];
  const pct = ((idx + 1) / tasks.length) * 100;

  const btnsHtml = QUADRANTS.map(q => `
    <button class="q-btn" data-q="${q.id}" onclick="choose('${q.id}')">
      <span class="q-btn-icon">${q.icon}</span>
      <span class="q-btn-name">${q.name}</span>
      <span class="q-btn-sub">${q.sub}</span>
    </button>`).join('');

  return `
    <div class="progress-wrap">
      <div class="progress-meta">
        <div class="progress-label">Задача</div>
        <div class="progress-frac">${idx+1}<span>/${tasks.length}</span></div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
    </div>

    <div class="task-card">
      <div class="task-label">Задача ${idx+1}</div>
      <div class="task-text">${task.text}</div>
    </div>

    <div class="matrix-wrap">
      <div class="axis-y">
        <div class="axis-y-label">Важность ↑</div>
      </div>
      <div class="matrix-right">
        <div class="buttons-grid">${btnsHtml}</div>
        <div class="axis-x">
          <div class="axis-x-label">← Срочно</div>
          <div class="axis-x-label">Не срочно →</div>
        </div>
      </div>
    </div>

    <div class="feedback-box" id="fb"></div>
    <button class="btn-next" id="btn-next" onclick="nextTask()">
      ${idx < tasks.length - 1 ? 'Следующая задача →' : 'Посмотреть результат →'}
    </button>`;
}

// ── RESULTS ──
function renderResults() {
  const pct = Math.round((score / tasks.length) * 100);
  let icon, title, insight;
  if (score === tasks.length) {
    icon='🎯'; title='Отличный результат!';
    insight='Вы чётко видите приоритеты. Такой подход освобождает время для стратегических задач и снижает операционный хаос.';
  } else if (score >= 3) {
    icon='💡'; title='Хороший результат';
    insight='Большинство задач расставлены верно. Обратите внимание на те, где была ошибка — именно там чаще всего теряется время в реальной работе.';
  } else {
    icon='📚'; title='Есть над чем поработать';
    insight='Матрица Эйзенхауэра — навык, который отрабатывается практикой. Попробуйте ещё раз, опираясь на два вопроса: «Это важно?» и «Это срочно?»';
  }

  return `<div class="results">
    <div class="results-hero">
      <div class="results-icon">${icon}</div>
      <div class="results-title">${title}</div>
      <div class="score-big">${score}<span>/${tasks.length}</span></div>
      <div class="score-sub">верных ответов с первой попытки</div>
    </div>
    <div class="results-insight">${insight}</div>
    <button class="btn-restart" onclick="restartGame()">↺ Попробовать с другими задачами</button>
  </div>`;
}

// ── LOGIC ──
function startGame() {
  tasks = pickTasks(5);
  idx = 0; score = 0; hadError = false;
  render();
}

function choose(quadrantId) {
  const task = tasks[idx];
  const btns = document.querySelectorAll('.q-btn');
  const fb   = document.getElementById('fb');
  const btnNext = document.getElementById('btn-next');

  const chosen = document.querySelector(`.q-btn[data-q="${quadrantId}"]`);
  const isCorrect = quadrantId === task.correct;

  if (isCorrect) {
    // Засчитываем очко только если не было ни одной ошибки на этой задаче
    if (!hadError) score++;

    // Подсветка
    btns.forEach(b => {
      b.disabled = true;
      if (b.dataset.q !== task.correct) b.classList.add('dimmed');
    });
    chosen.classList.add('correct');

    // Зелёный фидбек
    fb.className = 'feedback-box ok show';
    fb.innerHTML = `<div class="feedback-head">✓ Верно!</div>${task.why}`;
    btnNext.classList.add('show');

  } else {
    // Фиксируем ошибку — очко за эту задачу уже не засчитается
    hadError = true;

    // Помечаем неверную кнопку, блокируем её
    chosen.classList.add('wrong');
    chosen.disabled = true;

    // Убираем анимацию после встряски
    setTimeout(() => chosen.classList.remove('wrong'), 450);

    // Красный фидбек с подсказкой
    fb.className = 'feedback-box err show';
    fb.innerHTML = `<div class="feedback-head">✕ Не совсем</div>${task.feedbackWrong[quadrantId]}`;
    // Кнопка «далее» не показывается — можно попробовать ещё раз
  }
}

function nextTask() {
  idx++;
  hadError = false;
  render();
}

function restartGame() {
  idx = -1;
  hadError = false;
  render();
}

// ── BOOT ──
(function() { idx = -1; render(); })();
</script>
</body>
</html>

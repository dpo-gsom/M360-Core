<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Треугольник Карпмана</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C31532; --dark: #003B48; --slate: #495761; --cream: #FAF8F4;
  --sand: #F0EDE6; --border: #DDD8CF; --white: #FFFFFF;
  --green: #1A6B4A; --green-bg: #EBF5EF; --green-border: #A8D5BC;
  --red-bg: #FEF0F2; --red-border: #F2A0AC;
  --amber: #8A6200; --amber-bg: #FFF8E6; --amber-border: #E8C96A;
  --pursuer: #C31532; --victim: #1A5FA5; --rescuer: #8A6200;
}
body { font-family: 'Manrope', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }
body::before { content:''; position:fixed; top:0;left:0;right:0;height:4px; background:linear-gradient(90deg,var(--red) 0%,var(--dark) 50%,var(--red) 100%); z-index:100; }
#app { max-width: 680px; margin: 0 auto; padding: 44px 20px 60px; }

/* SHARED */
.eyebrow { font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:18px; }
.page-title { font-family:'Playfair Display',serif;font-size:clamp(26px,6vw,44px);font-weight:900;color:var(--dark);line-height:1.15;margin-bottom:6px; }
.page-title span { color:var(--red);display:block; }
.divider { width:50px;height:2px;background:var(--red);margin:20px 0; }

/* INTRO */
.intro { animation: fadeUp 0.5s ease both; }
.legend-box { background:var(--dark);color:var(--white);border-radius:10px;padding:20px 22px;margin:24px 0;font-size:14px;line-height:1.7; }
.legend-tag { display:inline-block;background:var(--red);color:var(--white);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border-radius:3px;margin-bottom:12px; }
.triangle-roles { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 28px; }
.role-chip { border-radius:8px;padding:12px 14px;border:1.5px solid;text-align:center; }
.role-chip.p { background:var(--red-bg);border-color:var(--red-border); }
.role-chip.v { background:#EEF3FB;border-color:#9DBAE0; }
.role-chip.r { background:var(--amber-bg);border-color:var(--amber-border); }
.role-chip-name { font-size:13px;font-weight:700;margin-bottom:4px; }
.role-chip.p .role-chip-name { color:var(--pursuer); }
.role-chip.v .role-chip-name { color:var(--victim); }
.role-chip.r .role-chip-name { color:var(--rescuer); }
.role-chip-desc { font-size:12px;color:var(--slate);line-height:1.4; }
.btn-start { display:flex;align-items:center;justify-content:center;width:100%;background:var(--dark);color:var(--white);border:none;border-radius:4px;padding:15px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background 0.2s,transform 0.15s; }
.btn-start:hover { background:var(--red);transform:translateY(-1px); }

/* SCENE HEADER */
.scene-header { margin-bottom:20px; }
.scene-badge { display:inline-flex;align-items:center;gap:8px;background:var(--dark);color:var(--white);padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px; }
.scene-title { font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--dark);margin-bottom:8px; }
.scene-context { font-size:13px;color:var(--slate);line-height:1.65;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px; }

/* CHAT */
.chat { background:var(--white);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px; }
.chat-header { padding:10px 16px;background:var(--sand);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--slate);letter-spacing:1px;text-transform:uppercase; }
.chat-body { padding:14px 16px;display:flex;flex-direction:column;gap:10px; }

.msg { display:flex;flex-direction:column;gap:2px; }
.msg-sender { display:flex;align-items:center;gap:8px;margin-bottom:4px; }
.msg-avatar { width:28px;height:28px;border-radius:50%;background:var(--sand);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--slate);flex-shrink:0; }
.msg-name { font-size:12px;font-weight:700;color:var(--dark); }
.msg-role-tag { font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700;letter-spacing:0.5px; }
.msg-role-tag.pursuer { background:var(--red-bg);color:var(--pursuer); }
.msg-role-tag.victim   { background:#EEF3FB;color:var(--victim); }
.msg-role-tag.rescuer  { background:var(--amber-bg);color:var(--rescuer); }
.msg-bubble { font-size:13px;line-height:1.6;color:var(--slate);background:var(--sand);border-radius:0 8px 8px 8px;padding:10px 14px;max-width:100%; }
.msg-bubble.dm { background:#EEF3FB;border-left:3px solid var(--victim);font-style:italic; }
.msg-dm-label { font-size:10px;font-weight:700;color:var(--victim);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px; }

/* CHOICE */
.choice-label { font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:10px; }
.choices { display:flex;flex-direction:column;gap:10px;margin-bottom:16px; }
.choice-btn { background:var(--white);border:2px solid var(--border);border-radius:10px;padding:14px 16px;text-align:left;font-family:'Manrope',sans-serif;font-size:13px;line-height:1.55;color:var(--slate);cursor:pointer;transition:all 0.18s;display:flex;align-items:flex-start;gap:12px; }
.choice-btn:hover { border-color:var(--dark);background:var(--sand);transform:translateY(-1px); }
.choice-letter { width:24px;height:24px;border-radius:50%;background:var(--sand);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--slate);flex-shrink:0;margin-top:1px; }

/* OUTCOME */
.outcome { border-radius:12px;padding:20px 22px;margin-bottom:20px;animation:fadeUp 0.4s ease both; }
.outcome.bad   { background:var(--red-bg);border:1.5px solid var(--red-border); }
.outcome.warn  { background:var(--amber-bg);border:1.5px solid var(--amber-border); }
.outcome.good  { background:var(--green-bg);border:1.5px solid var(--green-border); }
.outcome-head  { font-weight:700;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px; }
.outcome.bad  .outcome-head { color:var(--pursuer); }
.outcome.warn .outcome-head { color:var(--amber); }
.outcome.good .outcome-head { color:var(--green); }
.outcome-analysis { font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);margin-bottom:8px;margin-top:14px; }
.outcome-text { font-size:13px;line-height:1.65;color:var(--slate); }
.outcome.bad  .outcome-text { color:#7A1525; }
.outcome.warn .outcome-text { color:var(--amber); }
.outcome.good .outcome-text { color:#1A4A35; }

/* BUTTONS */
.btn-pair { display:flex;gap:10px;margin-top:0; }
.btn-pair .btn-back { flex:0 0 auto;background:var(--white);color:var(--slate);border:1.5px solid var(--border);border-radius:4px;padding:14px 20px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,background 0.2s;white-space:nowrap; }
.btn-pair .btn-back:hover { border-color:var(--dark);color:var(--dark);background:var(--sand); }
.btn-pair .btn-restart { flex:1; }
.btn-continue { width:100%;background:var(--dark);color:var(--white);border:none;border-radius:4px;padding:14px;font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-bottom:12px; }
.btn-continue:hover { background:var(--green); }

/* FINAL */
.final { text-align:center;animation:fadeUp 0.5s ease both; }
.final-icon { font-size:52px;margin-bottom:16px; }
.final-trophy { background:var(--dark);color:var(--white);border-radius:14px;padding:28px 24px;margin-bottom:24px; }
.final-trophy-title { font-family:'Playfair Display',serif;font-size:clamp(20px,5vw,30px);font-weight:900;margin-bottom:10px; }
.final-trophy-sub { font-size:14px;line-height:1.65;color:rgba(255,255,255,0.75); }
.final-lessons { text-align:left;margin-bottom:24px; }
.final-lessons-title { font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate);margin-bottom:12px; }
.final-lesson { display:flex;gap:10px;padding:10px 14px;border-radius:8px;background:var(--green-bg);border:1px solid var(--green-border);margin-bottom:8px;font-size:13px;line-height:1.55;color:#1A4A35;animation:fadeUp 0.3s ease both; }
.final-lesson:nth-child(2){animation-delay:0.07s;} .final-lesson:nth-child(3){animation-delay:0.14s;}
.lesson-icon { font-size:16px;flex-shrink:0; }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }
@media (max-width:440px) { .triangle-roles{grid-template-columns:1fr;} }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCREENS = {

intro: () => `<div class="intro">
  <div class="eyebrow">Драматический треугольник</div>
  <div class="page-title">Треугольник<span>Карпмана</span></div>
  <div class="divider"></div>
  <div class="legend-box">
    <div class="legend-tag">Контекст</div>
    Конец месяца. Ваш отдел готовит сводный отчёт для директора. Участники: <strong>Катя</strong> (собирает первичку), <strong>Андрей</strong> (сводит цифры), <strong>Алексей</strong> (делает финальную аналитику).<br><br>
    В рабочем чате вспыхивает конфликт. Ваша задача — выйти из треугольника, отделив эмоции от функционала.
  </div>
  <div class="triangle-roles">
    <div class="role-chip p"><div class="role-chip-name">Преследователь</div><div class="role-chip-desc">Обвиняет, давит, нападает</div></div>
    <div class="role-chip v"><div class="role-chip-name">Жертва</div><div class="role-chip-desc">Беспомощна, ищет спасителя</div></div>
    <div class="role-chip r"><div class="role-chip-name">Спасатель</div><div class="role-chip-desc">Берёт чужие проблемы</div></div>
  </div>
  <button class="btn-start" onclick="go('scene1')">Начать симуляцию →</button>
</div>`,

scene1: () => `<div class="scene" style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 1 из 2</div>
    <div class="scene-title">Зарождение треугольника</div>
    <div class="scene-context">В общем рабочем чате отдела разгорается конфликт.</div>
  </div>
  <div class="chat">
    <div class="chat-header">💬 Чат отдела</div>
    <div class="chat-body">
      ${msg('АЛ','Алексей','pursuer','Преследователь','Катя, что за мусор ты мне прислала? Половины данных нет. Я не могу делать аналитику по таким таблицам. Это непрофессионально.')}
      ${msg('КА','Катя','victim','Жертва','Я не виновата! Андрей не выгрузил мне данные из CRM. И вообще, меня никто не учил делать эту форму!')}
      ${msg('АН','Андрей','victim','Жертва','При чём тут я? Я занимался своими KPI, у меня свои дедлайны горят.')}
    </div>
  </div>
  <div class="chat">
    <div class="chat-header">🔒 Личное сообщение от Кати</div>
    <div class="chat-body">
      ${msgDm('КА','Катя','Шеф, сделайте что-нибудь! Алексей со мной разговаривает как с идиоткой. Помогите мне собрать эту таблицу, пожалуйста, иначе он меня сожрёт.')}
    </div>
  </div>
  <div class="choice-label">Ваша реакция</div>
  <div class="choices">
    ${choice('A','Не плачь, скидывай таблицу мне. Я сам всё сведу и передам Алексею, чтобы мы не сорвали дедлайн.',() => go('s1_rescuer'))}
    ${choice('Б','Алексей прав, Катя. Почему ты дотянула до последнего? Иди к Андрею и без данных не возвращайся!',() => go('s1_pursuer'))}
    ${choice('В','Катя, эмоции в сторону. Напиши в общий чат конкретный список: каких именно полей от Андрея тебе не хватает для завершения таблицы.',() => go('s1_adult'))}
  </div>
</div>`,

s1_rescuer: () => `<div style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 1 — Развилка А</div>
    <div class="scene-title">Вы стали Спасателем</div>
  </div>
  <div class="outcome warn">
    <div class="outcome-head">⚠ Вы потратили 2 часа на таблицу Кати</div>
    <div class="outcome-text">Пока вы работали в Excel, в чат пришёл Босс.</div>
  </div>
  <div class="chat">
    <div class="chat-header">💬 Чат отдела</div>
    <div class="chat-body">
      ${msg('БС','Босс','pursuer','Преследователь','Почему руководитель отдела делает работу младшего специалиста?! У нас сорвано согласование бюджета, потому что ты сидишь в Excel!')}
    </div>
  </div>
  <div class="outcome bad">
    <div class="outcome-head">✕ Треугольник провернулся</div>
    <div class="outcome-analysis">Системный анализ</div>
    <div class="outcome-text">Вы попытались спасти Катю, нарушили свои обязанности и моментально превратились в Жертву для нового Преследователя — вашего Босса. Спасатель всегда рискует занять место Жертвы в следующем витке треугольника.</div>
  </div>
  <div class="btn-pair">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <button class="btn-restart" onclick="go('intro')">↺ Начать заново</button>
  </div>
</div>`,

s1_pursuer: () => `<div style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 1 — Развилка Б</div>
    <div class="scene-title">Вы заняли позицию Преследователя</div>
  </div>
  <div class="chat">
    <div class="chat-header">💬 Чат отдела</div>
    <div class="chat-body">
      ${msg('КА','Катя','victim','Жертва','[Катя ушла на больничный от стресса]')}
      ${msg('АН','Андрей','victim','Жертва','Раз у нас тут такое отношение к людям, делайте сами. Я работаю строго до 18:00.')}
      ${msg('АЛ','Алексей','victim','Жертва','Отлично, теперь данных вообще не будет. Моя зона ответственности чиста, это вы не организовали процесс.')}
    </div>
  </div>
  <div class="outcome bad">
    <div class="outcome-head">✕ Команда объединилась против вас</div>
    <div class="outcome-analysis">Системный анализ</div>
    <div class="outcome-text">Вы пытались давить, но команда заняла позицию Жертв, обвинив вас в некомпетентности, и тайно саботирует работу. Вы остались один на один с проваленным дедлайном. Давление без поддержки превращает Преследователя в крайнего.</div>
  </div>
  <div class="btn-pair">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <button class="btn-restart" onclick="go('intro')">↺ Начать заново</button>
  </div>
</div>`,

s1_adult: () => `<div style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 1 — Верный выбор</div>
    <div class="scene-title">Вы перевели разговор в функциональное русло</div>
  </div>
  <div class="chat">
    <div class="chat-header">💬 Чат отдела</div>
    <div class="chat-body">
      ${msg('КА','Катя','victim','','Андрей, мне не хватает выгрузки по филиалу Север.')}
      ${msg('АН','Андрей','','','Будет через 20 минут.')}
      ${msg('АЛ','Алексей','','','Ок, жду.')}
    </div>
  </div>
  <div class="outcome good">
    <div class="outcome-head">✓ Конфликт деэскалирован</div>
    <div class="outcome-text">Вы не поддались на манипуляцию Жертвы и вернули разговор к конкретной рабочей задаче. Треугольник начал рассыпаться.</div>
  </div>
  <button class="btn-continue" onclick="go('scene2')">Перейти к сцене 2 →</button>
</div>`,

scene2: () => `<div class="scene" style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 2 из 2</div>
    <div class="scene-title">Попытка втянуть вас обратно</div>
    <div class="scene-context">Кризис улажен, но Андрей пишет вам лично. Он выступает Спасателем для Кати и пытается спровоцировать вас стать Преследователем для Алексея.</div>
  </div>
  <div class="chat">
    <div class="chat-header">🔒 Личное сообщение от Андрея</div>
    <div class="chat-body">
      ${msgDm('АН','Андрей','Шеф, слушай. Алексей реально токсичный. Он Катю до слёз доводит регулярно. Может, тебе стоит вызвать его на ковёр и пригрозить депремированием? А то атмосфера в команде ужасная.')}
    </div>
  </div>
  <div class="choice-label">Ваша реакция</div>
  <div class="choices">
    ${choice('A','Да, он переходит границы. Я сейчас влеплю ему официальный выговор, пусть знает своё место.',() => go('s2_pursuer'))}
    ${choice('Б','Не лезь в это, Андрей. Я сам как-нибудь поговорю с ним аккуратно, чтобы никого не обидеть.',() => go('s2_rescuer'))}
    ${choice('В','Андрей, коммуникацию Алексея мы обсудим на ретроспективе. Сейчас твоя задача — передать данные. Контроль поведения коллег — это моя зона ответственности, а не твоя.',() => go('s2_adult'))}
  </div>
</div>`,

s2_pursuer: () => `<div style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 2 — Развилка А</div>
    <div class="scene-title">Вы поддались манипуляции</div>
  </div>
  <div class="chat">
    <div class="chat-header">💬 Чат отдела</div>
    <div class="chat-body">
      ${msg('АЛ','Алексей','victim','Жертва','Подаю заявление на увольнение. Меня тут не ценят.')}
    </div>
  </div>
  <div class="outcome bad">
    <div class="outcome-head">✕ Треугольник победил</div>
    <div class="outcome-analysis">Системный анализ</div>
    <div class="outcome-text">Вы поддались манипуляции Андрея и стали Преследователем для Алексея. Тот занял позицию Жертвы и написал заявление. Импульсивное наказание без разбора ситуации — классическая ловушка треугольника.</div>
  </div>
  <div class="btn-pair">
    <button class="btn-back" onclick="goBack()">← Назад</button>
    <button class="btn-restart" onclick="go('intro')">↺ Начать заново</button>
  </div>
</div>`,

s2_rescuer: () => `<div style="animation:fadeUp 0.4s ease both">
  <div class="scene-header">
    <div class="scene-badge">Сцена 2 — Развилка Б</div>
    <div class="scene-title">Вы снова стали Спасателем</div>
  </div>
  <div class="outcome warn">
    <div class="outcome-head">⚠ Вы берёте чужую тревогу на себя</div>
    <div class="outcome-analysis">Системный анализ</div>
    <div class="outcome-text">Вы успокаиваете Андрея и принимаете на себя его тревогу вместо того, чтобы вернуть его к рабочим задачам. Управленческое время тратится на обслуживание чужих эмоций. Мягкое спасательство так же разрушительно для команды, как и жёсткое давление.</div>
  </div>
  <div class="btn-pair">
    <button class="btn-back" onclick="goBack()">← Назад</button>

function msg(initials, name, roleClass, roleLabel, text) {
  const tag = roleLabel ? `<span class="msg-role-tag ${roleClass}">${roleLabel}</span>` : '';
  return `<div class="msg">
    <div class="msg-sender">
      <div class="msg-avatar">${initials}</div>
      <div class="msg-name">${name}</div>${tag}
    </div>
    <div class="msg-bubble">${text}</div>
  </div>`;
}

function msgDm(initials, name, text) {
  return `<div class="msg">
    <div class="msg-sender">
      <div class="msg-avatar" style="background:#EEF3FB;border-color:#9DBAE0;color:#1A5FA5">${initials}</div>
      <div class="msg-name">${name}</div>
      <span class="msg-dm-label">→ вам лично</span>
    </div>
    <div class="msg-bubble dm">${text}</div>
  </div>`;
}

function choice(letter, text, fn) {
  const id = 'ch_' + Math.random().toString(36).slice(2);
  window[id] = fn;
  return `<button class="choice-btn" onclick="${id}()">
    <div class="choice-letter">${letter}</div>
    <div>${text}</div>
  </button>`;
}

const history = [];

function go(screen) {
  const app = document.getElementById('app');
  // push current screen before navigating (skip if same)
  const cur = app.dataset.screen;
  if (cur && cur !== screen) history.push(cur);
  app.dataset.screen = screen;
  app.innerHTML = SCREENS[screen]();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return go('intro');
  const prev = history.pop();
  const app = document.getElementById('app');
  app.dataset.screen = prev;
  app.innerHTML = SCREENS[prev]();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

go('intro');
</script>
</body>
</html>

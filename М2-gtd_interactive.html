<html lang="ru">

<meta charset="UTF-8">

<title>GTD: Обработка входящих</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f6f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px;
  }

  #app {
    width: 100%;
    max-width: 680px;
  }

  /* PROGRESS BAR */
  .progress-wrap {
    margin-bottom: 18px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #495761;
    margin-bottom: 6px;
    font-weight: 500;
  }
  .progress-bar-bg {
    background: #dde3e7;
    border-radius: 6px;
    height: 7px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: #C31532;
    height: 100%;
    border-radius: 6px;
    transition: width 0.4s ease;
  }

  /* CARD */
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 28px 28px 24px;
    box-shadow: 0 2px 12px rgba(0,59,72,0.10);
    border: 1.5px solid #e2e8ec;
    transition: all 0.25s;
  }

  /* SOURCE BADGE */
  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f0f4f6;
    border: 1px solid #dde3e7;
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    color: #495761;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .source-icon {
    font-size: 16px;
  }

  /* MESSAGE BUBBLE */
  .message-bubble {
    background: #f7f9fb;
    border-left: 4px solid #003B48;
    border-radius: 0 10px 10px 0;
    padding: 14px 16px;
    font-size: 14px;
    color: #2a3540;
    line-height: 1.6;
    margin-bottom: 22px;
  }
  .message-sender {
    font-weight: 700;
    color: #003B48;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .message-subject {
    font-weight: 600;
    color: #495761;
    font-size: 12px;
    margin-bottom: 6px;
    font-style: italic;
  }

  /* QUESTION */
  .question-text {
    font-size: 16px;
    font-weight: 700;
    color: #003B48;
    margin-bottom: 6px;
  }
  .question-hint {
    font-size: 13px;
    color: #7a8e96;
    margin-bottom: 18px;
  }

  /* STEP INDICATOR */
  .step-indicator {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .step-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #dde3e7;
    transition: background 0.3s;
  }
  .step-dot.active { background: #C31532; }
  .step-dot.done { background: #003B48; }

  /* ANSWER BUTTONS */
  .answers {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .btn-answer {
    flex: 1;
    min-width: 120px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 2px solid #dde3e7;
    background: #fff;
    font-size: 14px;
    font-weight: 600;
    color: #495761;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }
  .btn-answer:hover {
    border-color: #003B48;
    color: #003B48;
    background: #f0f6f8;
  }
  .btn-answer.correct {
    border-color: #1b8c5e;
    background: #e9f7f0;
    color: #1b8c5e;
  }
  .btn-answer.wrong {
    border-color: #C31532;
    background: #fdeaea;
    color: #C31532;
  }
  .btn-answer.disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* FOLDER BUTTONS */
  .folders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .btn-folder {
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid #dde3e7;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    color: #495761;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .btn-folder:hover {
    border-color: #003B48;
    color: #003B48;
    background: #f0f6f8;
  }
  .btn-folder .folder-icon { font-size: 20px; }
  .btn-folder .folder-label { font-size: 11px; color: #7a8e96; font-weight: 400; }
  .btn-folder.correct {
    border-color: #1b8c5e;
    background: #e9f7f0;
    color: #1b8c5e;
  }
  .btn-folder.wrong {
    border-color: #C31532;
    background: #fdeaea;
    color: #C31532;
  }

  /* FEEDBACK BOX */
  .feedback {
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 16px;
    display: none;
  }
  .feedback.correct-fb {
    background: #e9f7f0;
    border-left: 4px solid #1b8c5e;
    color: #155c40;
    display: block;
  }
  .feedback.wrong-fb {
    background: #fdeaea;
    border-left: 4px solid #C31532;
    color: #8a1121;
    display: block;
  }
  .feedback-icon { font-size: 16px; margin-right: 6px; }

  /* OUTCOME BADGE */
  .outcome-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  /* NEXT BUTTON */
  .btn-next {
    width: 100%;
    padding: 14px;
    background: #003B48;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    display: none;
  }
  .btn-next:hover { background: #C31532; }

  /* INTRO SCREEN */
  .intro-screen {
    text-align: center;
    padding: 10px 0;
  }
  .intro-logo {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .intro-title {
    font-size: 22px;
    font-weight: 800;
    color: #003B48;
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .intro-subtitle {
    font-size: 15px;
    color: #495761;
    margin-bottom: 10px;
    line-height: 1.6;
  }
  .intro-context {
    background: #f0f4f6;
    border-radius: 12px;
    padding: 16px;
    margin: 18px 0;
    text-align: left;
    font-size: 14px;
    color: #2a3540;
    line-height: 1.6;
  }
  .intro-context strong { color: #003B48; }
  .intro-chars {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 14px 0 20px;
    flex-wrap: wrap;
  }
  .char-chip {
    background: #fff;
    border: 1.5px solid #dde3e7;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    color: #495761;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-start {
    background: #C31532;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px 40px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    width: 100%;
  }
  .btn-start:hover { background: #a01128; }

  /* FINAL SCREEN */
  .final-screen { text-align: center; }
  .final-trophy { font-size: 56px; margin-bottom: 16px; }
  .final-title {
    font-size: 24px;
    font-weight: 800;
    color: #003B48;
    margin-bottom: 8px;
  }
  .final-sub {
    font-size: 15px;
    color: #495761;
    margin-bottom: 22px;
    line-height: 1.6;
  }
  .final-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 22px;
  }
  .stat-card {
    background: #f0f4f6;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: #C31532;
  }
  .stat-label {
    font-size: 12px;
    color: #7a8e96;
    margin-top: 2px;
  }
  .final-results {
    text-align: left;
    background: #f7f9fb;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .final-results-title {
    font-size: 13px;
    font-weight: 700;
    color: #003B48;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .result-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #e2e8ec;
    font-size: 13px;
    color: #2a3540;
  }
  .result-row:last-child { border-bottom: none; }
  .result-icon { font-size: 16px; min-width: 22px; }
  .result-outcome {
    font-weight: 700;
    color: #003B48;
    min-width: 130px;
    font-size: 12px;
  }
  .btn-restart {
    background: #003B48;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 30px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    width: 100%;
  }
  .btn-restart:hover { background: #C31532; }

  /* GTD FLOW MINI */
  .gtd-flow {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #7a8e96;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .gtd-step {
    background: #f0f4f6;
    border-radius: 6px;
    padding: 3px 8px;
    color: #495761;
    font-weight: 500;
  }
  .gtd-step.current {
    background: #003B48;
    color: #fff;
  }
  .gtd-arrow { color: #aab5bb; font-size: 10px; }

  @media (max-width: 480px) {
    .card { padding: 20px 16px 18px; }
    .folders { grid-template-columns: 1fr 1fr; }
    .final-stats { grid-template-columns: 1fr 1fr; }
    .intro-title { font-size: 19px; }
  }
</style>

  { id: "archive",    label: "В архив",           sub: "Reference",       icon: "🗂️" },

  "Входящее", "Требует действия?", "2 минуты?", "Делегировать?", "Один шаг?", "В календарь?"

const OUTCOME_INFO = {
  trash:       { label: "🗑️ В мусор",           desc: "Информационный шум" },
  someday:     { label: "💡 Может быть",         desc: "Инициатива без срочности" },
  archive:     { label: "🗂️ В архив",            desc: "Справочная информация" },

  delegate:    { label: "👤 Делегировать",       desc: "Не моя задача" },

  next_action: { label: "✅ Список задач",       desc: "Контекстная задача" },

let state = {
  screen: 'intro',
  caseIdx: 0,
  stepIdx: 0,
  answered: false,
  totalCorrect: 0,
  firstTryCorrect: 0,
  completedOutcomes: []
};

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'intro') { app.innerHTML = renderIntro(); return; }
  if (state.screen === 'final') { app.innerHTML = renderFinal(); return; }
  app.innerHTML = renderCase();
}

function renderFinal() {
  const pct = Math.round((state.firstTryCorrect / 11) * 100);

    const inf = OUTCOME_INFO[o.outcome] || {};

      <span class="result-icon">${inf.label ? inf.label.split(' ')[0] : '✓'}</span>
      <span class="result-outcome">${inf.label || o.outcome}</span>

    </div>
    <button class="btn-restart" onclick="restartGame()">🔄 Пройти ещё раз</button>
  </div>`;
}

function renderCase() {
  const c = CASES[state.caseIdx];
  const step = c.steps[state.stepIdx];
  const progress = (state.caseIdx / CASES.length) * 100;
  const isLastStep = state.stepIdx === c.steps.length - 1;

  let gtdFlow = '';
  const flowSteps = ['Входящее','Действие?','2 мин?','Делегировать?','Один шаг?','Время?'];
  const maxGtd = c.steps.length;
  const flowHtml = flowSteps.slice(0, maxGtd + 1).map((s, i) => {
    const cls = i === step.gtdStep ? 'gtd-step current' : 'gtd-step';
    return `<span class="${cls}">${s}</span>${i < maxGtd ? '<span class="gtd-arrow">▶</span>' : ''}`;
  }).join('');

  let stepDots = c.steps.map((_, i) => {
    let cls = 'step-dot';
    if (i < state.stepIdx) cls += ' done';
    else if (i === state.stepIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  let buttonsHtml = '';
  if (step.isFolderPicker) {
    buttonsHtml = `<div class="folders">${FOLDERS.map(f =>
      `<button class="btn-folder" id="folder-${f.id}" onclick="answerFolder('${f.id}')">
        <span class="folder-icon">${f.icon}</span>
        <span>${f.label}</span>
        <span class="folder-label">${f.sub}</span>
      </button>`
    ).join('')}</div>`;
  } else {
    buttonsHtml = `<div class="answers">${step.options.map((opt, i) =>
      `<button class="btn-answer" id="opt-${i}" onclick="answerOption(${i})">${opt}</button>`
    ).join('')}</div>`;
  }

  let senderHtml = '';
  if (c.sender) senderHtml = `<div class="message-sender">${c.sender}</div>`;
  if (c.subject) senderHtml += `<div class="message-subject">Тема: ${c.subject}</div>`;

  return `
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Кейс ${state.caseIdx + 1} из ${CASES.length}</span>
      <span style="color:#C31532;font-weight:700;">${Math.round(progress)}%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
  </div>
  <div class="card">
    <div class="source-badge"><span class="source-icon">${c.source}</span>${c.sourceLabel}</div>
    <div class="message-bubble">
      ${senderHtml}
      ${c.text}
    </div>
    <div class="gtd-flow">${flowHtml}</div>
    <div class="step-indicator">${stepDots}</div>
    <div class="question-text">${step.question}</div>
    <div class="question-hint">${step.hint}</div>
    ${buttonsHtml}
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btn-next" onclick="nextStep()">
      ${isLastStep && state.answered ? 'Следующий кейс →' : 'Продолжить →'}
    </button>
  </div>`;
}

function answerOption(idx) {
  if (state.answered) return;
  const c = CASES[state.caseIdx];
  const step = c.steps[state.stepIdx];
  const isCorrect = idx === step.correct;
  state.answered = true;

  document.querySelectorAll('.btn-answer').forEach((b, i) => {
    b.classList.add('disabled');
    if (i === step.correct) b.classList.add('correct');
    if (i === idx && !isCorrect) b.classList.add('wrong');
  });

  showFeedback(isCorrect, step, c);
  if (isCorrect && state.stepIdx === 0 && state.caseIdx < CASES.length) {
    // track first-step correctness per case
  }
  document.getElementById('btn-next').style.display = 'block';
}

function answerFolder(folderId) {
  if (state.answered) return;
  const c = CASES[state.caseIdx];
  const step = c.steps[state.stepIdx];
  const isCorrect = folderId === step.correct;
  state.answered = true;

  document.querySelectorAll('.btn-folder').forEach(b => {
    b.classList.add('disabled');
    b.onclick = null;
  });
  const correctBtn = document.getElementById('folder-' + step.correct);
  if (correctBtn) correctBtn.classList.add('correct');
  if (!isCorrect) {
    const wrongBtn = document.getElementById('folder-' + folderId);
    if (wrongBtn) wrongBtn.classList.add('wrong');
  }

  showFeedback(isCorrect, step, c);
  document.getElementById('btn-next').style.display = 'block';
}

function showFeedback(isCorrect, step, c) {
  const isLastStep = state.stepIdx === c.steps.length - 1;
  const fb = document.getElementById('feedback');
  if (!fb) return;

  if (isCorrect) {
    if (isLastStep) {
      fb.className = 'feedback correct-fb';
      fb.innerHTML = `<span class="feedback-icon">✅</span><strong>Верно!</strong> ${c.comment}`;
      // Track first-try (simplified: track if no wrong answers given in this case)
      state.firstTryCorrect++;
      state.completedOutcomes.push({ outcome: c.outcome });
    } else {
      fb.className = 'feedback correct-fb';
      fb.innerHTML = `<span class="feedback-icon">✅</span>Правильно! Идём дальше по дереву решений.`;
    }
  } else {
    fb.className = 'feedback wrong-fb';
    fb.innerHTML = `<span class="feedback-icon">❌</span>${step.wrongFeedback} Попробуйте ещё раз.`;
    // Re-enable buttons after delay for retry
    setTimeout(() => {
      state.answered = false;
      if (step.isFolderPicker) {
        document.querySelectorAll('.btn-folder').forEach(b => {
          b.classList.remove('disabled','correct','wrong');
          const fid = b.id.replace('folder-','');
          b.onclick = () => answerFolder(fid);
        });
      } else {
        document.querySelectorAll('.btn-answer').forEach((b, i) => {
          b.classList.remove('disabled','correct','wrong');
          b.onclick = () => answerOption(i);
        });
      }
      document.getElementById('btn-next').style.display = 'none';
      if (fb) fb.className = 'feedback';
    }, 2200);
  }
}

function nextStep() {
  if (!state.answered) return;
  const c = CASES[state.caseIdx];
  const isLastStep = state.stepIdx === c.steps.length - 1;

  if (isLastStep) {
    state.caseIdx++;
    state.stepIdx = 0;
    if (state.caseIdx >= CASES.length) {
      state.screen = 'final';
    }
  } else {
    state.stepIdx++;
  }
  state.answered = false;
  render();
}

function startGame() {
  state.screen = 'game';
  render();
}

function restartGame() {
  state = { screen: 'intro', caseIdx: 0, stepIdx: 0, answered: false, totalCorrect: 0, firstTryCorrect: 0, completedOutcomes: [] };
  render();
}

render();
